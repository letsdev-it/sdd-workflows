name: sdd-invalidate

on:
  workflow_call:
    inputs:
      spec_repo:
        description: Spec repo owner/name; defaults to SDD_SPEC_REPO
        type: string

jobs:
  invalidate:
    permissions:
      actions: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Invalidate open PRs after a product-spec change
        uses: letsdev-it/sdd-workflows/actions/sdd-invalidate@main
        env:
          EXPECTED_SPEC_REPO: ${{ inputs.spec_repo || vars.SDD_SPEC_REPO }}
        with:
          github-token: ${{ github.token }}
