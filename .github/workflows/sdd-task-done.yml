# SDD task-done propagation (SDD_PLAN.md §11) — reusable, for CODE repos.
#
# Called on `issues: [closed]`. When a generated task (label `sdd:task`)
# closes — normally via `Closes #N` on the merged code PR — this workflow:
#   1. finds the umbrella issue in the spec repo (the `Spec:`/`Intake:`
#      back-link in the task body),
#   2. comments on the umbrella that this repo's task is done,
#   3. if no open generated task for that umbrella remains across ALL of the
#      project's repos (zoltan.json), closes the umbrella — a multi-repo
#      change closes on its last subtask. The close reason is propagated:
#      last task completed → umbrella completed; last task not planned
#      (superseded/cancelled) → umbrella not planned. A completed umbrella
#      means the work actually happened.
#
# Requirements in the calling code repo: vars.SDD_APP_ID +
# secrets.SDD_APP_PRIVATE_KEY (or secrets.SDD_TASKS_TOKEN) — must be able to
# read the spec repo, read sibling code repos and write spec-repo issues.

name: sdd-task-done

on:
  workflow_call:
    inputs:
      spec_repo:
        description: The spec repo (owner/name) holding zoltan.json manifests
        type: string
        default: letsdev-it/sdd-specs
    secrets:
      SDD_TASKS_TOKEN:
        required: false
      SDD_APP_PRIVATE_KEY:
        required: false

jobs:
  sdd-task-done:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app
        if: vars.SDD_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDD_APP_ID }}
          private-key: ${{ secrets.SDD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.spec_repo }}
          token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          path: spec-repo

      - name: Propagate completion to the umbrella issue
        uses: actions/github-script@v7
        env:
          SPEC_REPO: ${{ inputs.spec_repo }}
        with:
          github-token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          script: |
            const { execFileSync } = require('node:child_process');
            const fs = require('node:fs');
            const path = require('node:path');
            const { owner, repo } = context.repo;
            const task = context.payload.issue;
            if (!task || context.payload.action !== 'closed') return;
            if (!(task.labels || []).some((l) => l.name === 'sdd:task')) {
              core.info(`#${task.number} is not an SDD task — nothing to do.`);
              return;
            }
            const [specOwner, specName] = process.env.SPEC_REPO.split('/');
            const ref = (task.body || '').match(new RegExp(`(?:Spec|Intake):\\s*${specOwner}/${specName}#(\\d+)`, 'i'));
            if (!ref) {
              core.notice(`Task #${task.number} has no umbrella back-link — nothing to propagate.`);
              return;
            }
            const umbrellaNumber = +ref[1];
            const refRe = new RegExp(`(?:Spec|Intake):\\s*${specOwner}/${specName}#${umbrellaNumber}(?!\\d)`, 'i');

            // ---------- sibling repos of this project ----------
            const git = (...a) => execFileSync('git', ['-C', 'spec-repo', ...a], { encoding: 'utf8', maxBuffer: 64 * 1024 * 1024 });
            const slugOf = (url) => {
              const m = String(url).match(/github\.com[:/]([\w.-]+)\/([\w.-]+?)(?:\.git)?\/?$/);
              return m ? `${m[1]}/${m[2]}` : null;
            };
            let siblings = [`${owner}/${repo}`];
            for (const mp of git('ls-files').split('\n').filter((f) => path.basename(f) === 'zoltan.json')) {
              try {
                const manifest = JSON.parse(fs.readFileSync(path.join('spec-repo', mp), 'utf8'));
                const slugs = (manifest.repos || []).map((r) => slugOf(r.url)).filter(Boolean);
                if (slugs.some((s) => s.toLowerCase() === `${owner}/${repo}`.toLowerCase())) { siblings = slugs; break; }
              } catch { /* ignore */ }
            }

            // ---------- remaining open tasks for this umbrella ----------
            const remaining = [];
            for (const slug of siblings) {
              const [o, r] = slug.split('/');
              try {
                const open = await github.paginate(github.rest.issues.listForRepo, { owner: o, repo: r, labels: 'sdd:task', state: 'open', per_page: 100 });
                for (const i of open) if (!i.pull_request && refRe.test(i.body || '')) remaining.push(i.html_url);
              } catch (e) {
                core.warning(`Cannot list tasks in ${slug} (${e.message}) — NOT closing the umbrella to be safe.`);
                remaining.push(`(unreadable: ${slug})`);
              }
            }

            // ---------- umbrella bookkeeping ----------
            const { data: umbrella } = await github.rest.issues.get({ owner: specOwner, repo: specName, issue_number: umbrellaNumber });
            if (umbrella.state !== 'open') {
              core.info(`Umbrella ${specOwner}/${specName}#${umbrellaNumber} is already closed.`);
              return;
            }
            const notPlanned = task.state_reason === 'not_planned';
            const done = `Task ${task.html_url} (\`${owner}/${repo}\`) closed${notPlanned ? ' as **not planned** (superseded/cancelled)' : ''}.`;
            if (remaining.length) {
              await github.rest.issues.createComment({ owner: specOwner, repo: specName, issue_number: umbrellaNumber,
                body: `${done}\nRemaining open tasks: ${remaining.length}\n${remaining.map((u) => `- ${u}`).join('\n')}` });
              core.notice(`Umbrella #${umbrellaNumber}: ${remaining.length} task(s) still open.`);
            } else if (notPlanned) {
              await github.rest.issues.createComment({ owner: specOwner, repo: specName, issue_number: umbrellaNumber,
                body: `${done}\nNo open tasks remain, but the last one was not completed — closing as **not planned**. If this work is still wanted, file a new intake issue.` });
              await github.rest.issues.update({ owner: specOwner, repo: specName, issue_number: umbrellaNumber, state: 'closed', state_reason: 'not_planned' });
              core.notice(`Umbrella #${umbrellaNumber} closed as not planned.`);
            } else {
              await github.rest.issues.createComment({ owner: specOwner, repo: specName, issue_number: umbrellaNumber,
                body: `${done}\nAll generated tasks for this issue are done — closing.` });
              await github.rest.issues.update({ owner: specOwner, repo: specName, issue_number: umbrellaNumber, state: 'closed', state_reason: 'completed' });
              core.notice(`Umbrella #${umbrellaNumber} closed — last task done.`);
            }
