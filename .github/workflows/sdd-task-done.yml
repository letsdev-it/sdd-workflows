name: sdd-task-done

on:
  workflow_call:
    inputs:
      spec_repo:
        description: Spec repo owner/name; defaults to SDD_SPEC_REPO
        type: string
    secrets:
      SDD_TASKS_TOKEN:
        required: false
      SDD_APP_PRIVATE_KEY:
        required: false

jobs:
  sdd-task-done:
    permissions:
      checks: read
      contents: read
      issues: write
      pull-requests: read
      statuses: read
    runs-on: ubuntu-latest
    steps:
      - name: Resolve spec repo
        if: (inputs.spec_repo || vars.SDD_SPEC_REPO) == ''
        run: |
          echo "::error::Set SDD_SPEC_REPO or pass spec_repo."
          exit 1

      - name: Mint GitHub App token
        id: app
        if: vars.SDD_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDD_APP_ID }}
          private-key: ${{ secrets.SDD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.spec_repo || vars.SDD_SPEC_REPO }}
          token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          path: spec-repo

      - name: Validate and propagate authorized completion
        uses: letsdev-it/sdd-workflows/actions/sdd-task-done@main
        env:
          SPEC_REPO: ${{ inputs.spec_repo || vars.SDD_SPEC_REPO }}
        with:
          github-token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
