# SDD clarification — reusable, for code repos.
#
# `/sdd clarify <question>` on an open alignment task blocks the task and
# forwards the question to its umbrella issue in the spec repo, where the
# spec-side drafter turns it into a focused spec PR. The answer therefore
# enters the contract instead of being decided in the code.
#
# The umbrella is read from the task's sdd:align marker — an alignment task
# carries the range it consumes, and the newest umbrella in that range receives
# the question. A range with no linked intake has nowhere to put it, and the
# job says so rather than guessing.

name: sdd-clarification

on:
  workflow_call:
    inputs:
      spec_repo:
        description: Spec repo owner/name; defaults to SDD_SPEC_REPO
        type: string
    secrets:
      SDD_TASKS_TOKEN:
        required: false
      SDD_APP_PRIVATE_KEY:
        required: false

jobs:
  clarification:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app
        if: vars.SDD_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDD_APP_ID }}
          private-key: ${{ secrets.SDD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Forward product clarification to the umbrella
        uses: letsdev-it/sdd-workflows/actions/sdd-clarification@main
        env:
          SPEC_REPO: ${{ inputs.spec_repo || vars.SDD_SPEC_REPO }}
        with:
          # Comments in the spec repo, so this needs the cross-repo identity.
          github-token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
