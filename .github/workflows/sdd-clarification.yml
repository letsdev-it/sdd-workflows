name: sdd-clarification

on:
  workflow_call:
    inputs:
      spec_repo:
        description: Spec repo owner/name; defaults to SDD_SPEC_REPO
        type: string
    secrets:
      SDD_TASKS_TOKEN:
        required: false
      SDD_APP_PRIVATE_KEY:
        required: false

jobs:
  clarification:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app
        if: vars.SDD_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDD_APP_ID }}
          private-key: ${{ secrets.SDD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Forward product clarification to the umbrella
        uses: actions/github-script@v7
        env:
          SPEC_REPO: ${{ inputs.spec_repo || vars.SDD_SPEC_REPO }}
        with:
          github-token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          script: |
            if (context.eventName !== 'issue_comment' || context.payload.action !== 'created') return;
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            if (!issue || issue.pull_request || !comment) return;
            const match = (comment.body || '').match(/^\/sdd\s+clarify\s+([\s\S]+)/i);
            if (!match) return;
            const labels = new Set((issue.labels || []).map((label) => label.name));
            if (issue.state !== 'open' || !labels.has('sdd:task')) {
              core.setFailed('/sdd clarify applies only to an open sdd:task issue.');
              return;
            }
            const specRepo = process.env.SPEC_REPO;
            if (!specRepo) { core.setFailed('SDD_SPEC_REPO is not configured.'); return; }
            const [specOwner, specName] = specRepo.split('/');
            const ref = (issue.body || '').match(new RegExp(`(?:Spec|Intake):\\s*${specOwner}/${specName}#(\\d+)`, 'i'));
            if (!ref) { core.setFailed('The task has no umbrella backlink.'); return; }
            const { owner, repo } = context.repo;
            try {
              await github.rest.issues.createLabel({ owner, repo, name: 'sdd:blocked-product', color: 'd93f0b', description: 'Blocked on an accepted product-spec decision' });
            } catch (error) { if (error.status !== 422) throw error; }
            await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['sdd:blocked-product'] });
            const question = match[1].trim();
            await github.rest.issues.createComment({
              owner: specOwner, repo: specName, issue_number: Number(ref[1]),
              body: [
                '<!-- sdd:clarification-request -->',
                `## Product clarification requested from ${owner}/${repo}#${issue.number}`,
                '', question, '',
                `Source comment: ${comment.html_url}`,
                `Requested by: @${comment.user.login}`,
              ].join('\n'),
            });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number,
              body: `Marked as \`sdd:blocked-product\` and forwarded the question to ${specOwner}/${specName}#${ref[1]}. Work stays on the existing branch and task.`,
            });
