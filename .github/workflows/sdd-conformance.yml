# SDD conformance check — reusable, for code repos.
#
# Green light for merge = the PR does not take the code beyond or against
# the project's PRODUCT SPEC (spec repo). The CURRENT spec is the
# authorization — in SDD the spec changes before code, so legitimate
# contract work is, by construction, already described by the spec at
# code-PR time; no link metadata is required (provenance is reported as
# context only). Verdict:
#   - conforms      → PASS: no externally-observable change, or the diff
#                     implements / moves the code toward the current spec
#   - beyond_spec   → FAIL: introduces observable behavior the spec does
#                     not describe — route it through the spec repo first
#   - against_spec  → FAIL: resulting behavior contradicts the current
#                     spec (e.g. the spec moved on since the task was
#                     created) — implement the newest spec state
# Also emits a NON-BLOCKING tech-spec advisory: a warning when the
# diff looks architectural and no tech-spec/docs file was touched.
#
# Requirements in the calling code repo: vars.SDD_APP_ID +
# secrets.SDD_APP_PRIVATE_KEY (or secrets.SDD_TASKS_TOKEN) — must be able to
# READ the spec repo; secrets.SDD_LLM_API_KEY.

name: sdd-conformance

on:
  workflow_call:
    inputs:
      spec_repo:
        description: The spec repo (owner/name) holding zoltan.json manifests
        type: string
        default: letsdev-it/sdd-specs
    secrets:
      SDD_TASKS_TOKEN:
        required: false
      SDD_APP_PRIVATE_KEY:
        required: false
      SDD_LLM_API_KEY:
        required: false

jobs:
  sdd-conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app
        if: vars.SDD_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDD_APP_ID }}
          private-key: ${{ secrets.SDD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.spec_repo }}
          token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          path: spec-repo

      - name: Judge conformance against the product spec
        uses: actions/github-script@v7
        env:
          SPEC_REPO: ${{ inputs.spec_repo }}
          LLM_BASE_URL: ${{ vars.SDD_LLM_BASE_URL || 'https://openrouter.ai/api/v1' }}
          LLM_MODEL: ${{ vars.SDD_LLM_MODEL || 'anthropic/claude-sonnet-4.5' }}
          LLM_API_KEY: ${{ secrets.SDD_LLM_API_KEY }}
        with:
          github-token: ${{ steps.app.outputs.token || secrets.SDD_TASKS_TOKEN || github.token }}
          script: |
            const { execFileSync } = require('node:child_process');
            const fs = require('node:fs');
            const path = require('node:path');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) { core.setFailed('sdd-conformance must be called from a pull_request-triggered workflow.'); return; }
            const specRepo = process.env.SPEC_REPO;
            const [specOwner, specName] = specRepo.split('/');
            const clip = (s, max) => (s.length > max ? s.slice(0, max) + '\n… [truncated]' : s);

            // ---------- locate this repo's project in the spec repo ----------
            const git = (...a) => execFileSync('git', ['-C', 'spec-repo', ...a], { encoding: 'utf8', maxBuffer: 64 * 1024 * 1024 });
            const slugOf = (url) => {
              const m = String(url).match(/github\.com[:/]([\w.-]+)\/([\w.-]+?)(?:\.git)?\/?$/);
              return m ? `${m[1]}/${m[2]}`.toLowerCase() : null;
            };
            let project = null;
            for (const mp of git('ls-files').split('\n').filter((f) => path.basename(f) === 'zoltan.json')) {
              try {
                const manifest = JSON.parse(fs.readFileSync(path.join('spec-repo', mp), 'utf8'));
                if ((manifest.repos || []).some((r) => slugOf(r.url) === `${owner}/${repo}`.toLowerCase())) {
                  project = { dir: path.dirname(mp), name: manifest.name || path.dirname(mp) };
                  break;
                }
              } catch { /* ignore */ }
            }
            if (!project) {
              core.notice(`${owner}/${repo} is not listed in any zoltan.json of ${specRepo} — conformance check does not apply.`);
              return;
            }
            if (!process.env.LLM_API_KEY) { core.setFailed('secrets.SDD_LLM_API_KEY is not set in this repo.'); return; }

            // ---------- product spec content ----------
            let spec = '';
            for (const f of git('ls-files', '--', project.dir === '.' ? '.' : project.dir).split('\n').filter(Boolean)) {
              if (spec.length > 60000) { spec += '\n… [more files omitted]\n'; break; }
              spec += `\n===== ${f} =====\n${clip(fs.readFileSync(path.join('spec-repo', f), 'utf8'), 20000)}\n`;
            }

            // ---------- PR diff + files ----------
            const { data: diff } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number, mediaType: { format: 'diff' } });
            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number, per_page: 100 });
            const fileList = files.map((f) => f.filename);

            // ---------- spec provenance (mechanical) ----------
            const text = `${pr.title}\n${pr.body || ''}`;
            const linked = [];
            for (const m of text.matchAll(/\b(?:ref|refs|close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[\s:]+#(\d+)/gi)) linked.push(+m[1]);
            let provenance = new RegExp(`${specOwner}/${specName}(#\\d+|/pull/|/commit/)`, 'i').test(text) ? 'direct spec link in PR' : null;
            for (const n of linked) {
              if (provenance) break;
              try {
                const { data: task } = await github.rest.issues.get({ owner, repo, issue_number: n });
                if (new RegExp(`Spec:\\s*${specOwner}/${specName}#\\d+`, 'i').test(task.body || '')) provenance = `linked task #${n} (from a merged spec change)`;
              } catch { /* dangling ref */ }
            }

            // ---------- LLM verdict ----------
            const res = await fetch(`${(process.env.LLM_BASE_URL || '').replace(/\/+$/, '')}/chat/completions`, {
              method: 'POST',
              headers: { 'content-type': 'application/json', authorization: `Bearer ${process.env.LLM_API_KEY}` },
              body: JSON.stringify({ model: process.env.LLM_MODEL, temperature: 0, messages: [
                { role: 'system', content: [
                  'You are the spec-conformance judge of an SDD (spec-driven development) pipeline.',
                  'The PRODUCT SPEC below is the confirmed contract (the TARGET STATE) of the system. In SDD the spec changes BEFORE code, so the current spec is the sole authorization for contract work. Judge the pull-request diff of ONE code repository against it.',
                  'Classify the diff into exactly one verdict:',
                  '- "conforms" — it does not affect externally-observable behavior (refactors, tests, tooling, tech-spec/docs), OR it implements / moves the code toward behavior the current spec describes. Implementing missing specified functionality from scratch conforms.',
                  '- "beyond_spec" — it introduces or alters externally-observable behavior that the current spec does NOT describe (an unspecified feature or contract change).',
                  '- "against_spec" — it results in behavior CONTRADICTING the current spec.',
                  'Be conservative: when the change is plausibly within the spec\'s intent, prefer "conforms".',
                  'Also: tech_spec_advisory — if the diff significantly changes internal architecture and no tech-spec/architecture/docs file is among the changed files, a one-sentence nudge; otherwise null.',
                  'Output ONLY JSON: {"verdict":"conforms|beyond_spec|against_spec","explanation":"2-4 sentences, cite the relevant spec passage","tech_spec_advisory":string|null}',
                ].join('\n') },
                { role: 'user', content: [
                  `PRODUCT SPEC (project: ${project.name}):`, spec || '(empty)',
                  '', `PULL REQUEST #${pr.number}: ${pr.title}`, clip(pr.body || '', 3000),
                  '', 'CHANGED FILES:', fileList.join('\n'),
                  '', 'DIFF:', '```diff', clip(String(diff), 50000), '```',
                ].join('\n') },
              ] }),
            });
            if (!res.ok) throw new Error(`LLM API ${res.status}: ${clip(await res.text(), 2000)}`);
            const content = (await res.json()).choices?.[0]?.message?.content || '';
            const s = content.indexOf('{'), e = content.lastIndexOf('}');
            const verdict = JSON.parse(content.slice(s, e + 1));

            // ---------- decision ----------
            if (verdict.tech_spec_advisory) core.warning(`Tech-spec advisory (non-blocking): ${verdict.tech_spec_advisory}`);
            const lines = [
              `# SDD conformance — PR #${pr.number}`,
              '',
              `- verdict: **${verdict.verdict}**`,
              `- spec provenance (context only): **${provenance || 'none'}**`,
              '',
              verdict.explanation || '',
              verdict.tech_spec_advisory ? `\n> ⚠ Tech-spec advisory (non-blocking): ${verdict.tech_spec_advisory}` : '',
            ];
            await core.summary.addRaw(lines.join('\n')).write();

            if (verdict.verdict === 'beyond_spec') {
              core.setFailed(`This PR introduces externally-observable behavior the product spec does not describe. Route the contract change through ${specRepo} (issue → spec PR → merge → generated task), or drop the unspecified behavior. ${verdict.explanation || ''}`);
            } else if (verdict.verdict === 'against_spec') {
              core.setFailed(`This PR results in behavior contradicting the CURRENT product spec${provenance ? ` (provenance: ${provenance} — the spec may have moved on since)` : ''}. Check the latest spec state in ${specRepo}/${project.dir}. ${verdict.explanation || ''}`);
            } else {
              core.notice(`Conformance OK${provenance ? ` (${provenance})` : ''}.`);
            }
