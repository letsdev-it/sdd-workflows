name: SDD freshness invalidation and automatic revalidation
description: Invalidate open PRs after a spec change and rerun their pull-request workflows
inputs:
  github-token:
    description: Token with statuses:write and actions:write in the code repository
    required: true
runs:
  using: composite
  steps:
    - name: Invalidate and revalidate open PRs
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const run = require('${{ github.action_path }}/invalidate.js');
          await run({ github, context, core });
