name: SDD conformance implementation
description: Judge a code PR against the authoritative product spec
inputs:
  github-token:
    description: Token that can read the spec repo and the code PR
    required: true
runs:
  using: composite
  steps:
    - name: Judge conformance
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const run = require('${{ github.action_path }}/conformance.js');
          await run({ github, context, core });
