name: SDD spec review implementation
description: Blocking quality gate on a proposed contract change
inputs:
  github-token:
    description: Token that can comment on this repo's pull requests
    required: true
runs:
  using: composite
  steps:
    - name: Review the proposed contract
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const run = require('${{ github.action_path }}/review.js');
          await run({ github, context, core });
