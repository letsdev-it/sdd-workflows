name: SDD drift audit
description: Compare a code repository with its authoritative product spec
inputs:
  github-token:
    required: true
    description: Token that can read code and write intake issues in the spec repo
runs:
  using: composite
  steps:
    - name: Audit drift
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const run = require('${{ github.action_path }}/audit.js');
          await run({ github, context, core });
