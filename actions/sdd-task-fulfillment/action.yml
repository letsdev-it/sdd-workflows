name: SDD task fulfillment
description: Verify that a code PR completely fulfills its linked SDD task
inputs:
  github-token:
    description: Token that can read the code PR, task, and spec repo
    required: true
runs:
  using: composite
  steps:
    - name: Judge task fulfillment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const run = require('${{ github.action_path }}/fulfillment.js');
          await run({ github, context, core });
